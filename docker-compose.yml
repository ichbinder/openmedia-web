services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinescope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinescope_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cinescope}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinescope}"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-test:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cinescope_test
      POSTGRES_PASSWORD: cinescope_test
      POSTGRES_DB: cinescope_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinescope_test"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
