name: Web Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cinescope
          POSTGRES_PASSWORD: cinescope_dev
          POSTGRES_DB: cinescope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinescope"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ichbinder/openmedia-api
          path: server
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Generate Prisma Client
        run: cd server && npx prisma generate

      - name: Push schema to DB
        run: cd server && npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://cinescope:cinescope_dev@localhost:5432/cinescope

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DATABASE_URL: postgresql://cinescope:cinescope_dev@localhost:5432/cinescope
          JWT_SECRET: ci-test-secret

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
