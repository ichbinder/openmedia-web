name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  e2e:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    services:
      # Test database — matches the db-test service in docker-compose.yml.
      # Playwright specs run against this DB exclusively; the dev DB is not
      # needed in CI.
      db-test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cinescope_test
          POSTGRES_PASSWORD: cinescope_test
          POSTGRES_DB: cinescope_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cinescope_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      # ── Checkout both repos ───────────────────────────────────────────
      - name: Checkout openmedia-web
        uses: actions/checkout@v4

      - name: Checkout openmedia-api
        uses: actions/checkout@v4
        with:
          repository: ichbinder/openmedia-api
          ref: main
          path: openmedia-api

      # ── Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Install dependencies ──────────────────────────────────────────
      - name: Install web dependencies
        run: npm ci

      - name: Install API dependencies
        run: cd openmedia-api && npm ci

      # ── Prisma setup (API) ────────────────────────────────────────────
      - name: Generate Prisma client
        run: cd openmedia-api && npx prisma generate
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test

      - name: Push schema to test DB
        run: cd openmedia-api && npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test

      # ── Playwright browser ────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── Run E2E tests ─────────────────────────────────────────────────
      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          API_REPO_PATH: ./openmedia-api
          # These are passed through to the webServer env blocks in
          # playwright.config.ts but also need to be available at the
          # process level for Playwright's webServer command execution.
          TMDB_API_KEY: "ci-mock-key-unused"
          BACKEND_URL: "http://localhost:4000"

      # ── Artifacts on failure ──────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces + screenshots)
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 14
